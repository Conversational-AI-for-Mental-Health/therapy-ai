name: E2E Tests

on:
  pull_request:
  push:
    branches: [main, develop]

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017

    env:
      NODE_ENV: test
      PORT: 3000
      MONGODB_URI: mongodb://localhost:27017/therapy-ai-e2e
      JWT_SECRET: e2e-test-secret-do-not-use-in-prod
      CORS_ORIGIN: http://localhost:8080
      AI_SERVICE_URL: http://localhost:5000
      REACT_APP_API_URL: http://localhost:3000/api
      REACT_APP_SOCKET_URL: http://localhost:3000

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Enable Corepack / Yarn 4.12.0
        run: corepack enable && corepack prepare yarn@4.12.0 --activate

      - name: Cache Yarn + Cypress binary
        uses: actions/cache@v4
        with:
          path: |
            ${{ github.workspace }}/.yarn/cache
            ~/.cache/Cypress
            ~/.cache/mongodb-binaries
          key: ${{ runner.os }}-yarn-cypress-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-yarn-cypress-
            ${{ runner.os }}-yarn-

      - name: Install root dependencies
        run: yarn install --immutable

      - name: Install E2E dependencies
        run: yarn install --immutable
        working-directory: e2e

      - name: Build frontend
        run: yarn workspace therapy-ai-frontend build

      - name: Start backend server (background)
        run: yarn workspace therapy-ai-backend dev &
        env:
          NODE_ENV: development

      - name: Wait for backend to be ready
        run: |
          echo "Waiting for backend on port 3000..."
          for i in {1..30}; do
            curl -s http://localhost:3000/api/users/me -o /dev/null && echo "Backend ready" && break
            echo "Attempt $i: backend not ready yet..."
            sleep 2
          done

      - name: Serve frontend build (background)
        run: |
          npx serve -s frontend/dist -l 8080 &

      - name: Wait for frontend to be ready
        run: |
          echo "Waiting for frontend on port 8080..."
          for i in {1..20}; do
            curl -s http://localhost:8080 -o /dev/null && echo "Frontend ready" && break
            sleep 2
          done

      - name: Run Cypress E2E Tests
        uses: cypress-io/github-action@v6
        with:
          working-directory: e2e
          browser: chrome
          headed: false
          config: baseUrl=http://localhost:8080
        env:
          CYPRESS_API_URL: http://localhost:3000/api
          CYPRESS_SOCKET_URL: http://localhost:3000

      - name: Upload screenshots on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: cypress-screenshots
          path: e2e/cypress/screenshots
          retention-days: 7

      - name: Upload videos on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: cypress-videos
          path: e2e/cypress/videos
          retention-days: 7
