name: Tests

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - uses: actions/setup-node@v2
        with:
          node-version: '18'
          cache: 'yarn' 

      - run: yarn install --frozen-lockfile 
      
      - run: yarn test -- --coverage       

      - uses: codecov/codecov-action@v2