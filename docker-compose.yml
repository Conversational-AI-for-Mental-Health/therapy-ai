services:
  # MONGODB SERVICE (NEW)
  mongodb:
    image: mongo:7.0
    container_name: therapy-ai-mongodb
    ports:
      - '27017:27017'
    environment:
      - MONGO_INITDB_DATABASE=therapy-ai
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    networks:
      - therapy-ai-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

  # MONGO EXPRESS (NEW - Optional UI)
  mongo-express:
    image: mongo-express:latest
    container_name: therapy-ai-mongo-express
    ports:
      - '8081:8081'
    environment:
      - ME_CONFIG_MONGODB_URL=mongodb://mongodb:27017/
      - ME_CONFIG_BASICAUTH_USERNAME=admin
      - ME_CONFIG_BASICAUTH_PASSWORD=admin123
    depends_on:
      - mongodb
    networks:
      - therapy-ai-network
    restart: always

  # BACKEND SERVICE (UPDATED)
  therapy-ai-backend:
    build:
      context: .
      dockerfile: ./backend/Dockerfile
      target: final
    env_file:
      - ./backend/.env
    ports:
      - '3000:3000'
    container_name: therapy-ai-backend
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - therapy-ai-network
    restart: always
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/therapy-ai

  # FRONTEND SERVICE (UPDATED)
  therapy-ai-frontend:
    build:
      context: .
      dockerfile: ./frontend/Dockerfile
      target: final
    depends_on:
      - therapy-ai-backend
    ports:
      - '8080:80'
    container_name: therapy-ai-frontend
    networks:
      - therapy-ai-network
    restart: always

  # MOBILE SERVICE (EXPO DEV SERVER)
  therapy-ai-mobile:
    build:
      context: .
      dockerfile: ./mobile/Dockerfile
    depends_on:
      - therapy-ai-backend
    ports:
      - '8082:8081'
      - '19000:19000'
      - '19001:19001'
      - '19002:19002'
      - '19006:19006'
    container_name: therapy-ai-mobile
    networks:
      - therapy-ai-network
    restart: always
    environment:
      - EXPO_PUBLIC_API_URL=http://localhost:3000/api

# VOLUMES (NEW)
volumes:
  mongodb_data:
    driver: local
  mongodb_config:
    driver: local

# NETWORKS (NEW)
networks:
  therapy-ai-network:
    driver: bridge
