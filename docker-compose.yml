services:
  # ---------------------------------
  # BACKEND SERVICE
  # ---------------------------------
  therapy-ai-backend:
    build:
      context: .
      dockerfile: ./backend/Dockerfile
      target: final
    env_file:
      - ./backend/.env
    ports:
      - "3000:3000"
    container_name: therapy-ai-backend
    restart: always

  # ---------------------------------
  # FRONTEND SERVICE
  # ---------------------------------
  therapy-ai-frontend:
    build:
      context: .
      dockerfile: ./frontend/Dockerfile
      target: final
    depends_on:
      - therapy-ai-backend
    ports:
      - "8080:80"
    container_name: therapy-ai-frontend
    restart: always
    env_file:
      - ./frontend/.env

  # ... (MongoDB service must also be present here)
